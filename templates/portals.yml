# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.infosys.com   ⚠️ https://infosys.wd3.myworkdayjobs.com (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] .NET / C# core keywords
    - ".NET"
    - "C#"
    - "ASP.NET"
    - ".NET Core"
    - ".NET Framework"
    - "dotnet"
    - "dot net"
    # -- Microsoft stack --
    - "WPF"
    - "WCF"
    - "Blazor"
    - "Entity Framework"
    - "Azure"
    - "MAUI"
    - "Xamarin"
    - "SignalR"
    - "Web API"
    - "MVC"
    - "LINQ"
    # -- Role titles --
    - ".NET Developer"
    - ".NET Engineer"
    - "C# Developer"
    - "Full Stack .NET"
    - "Backend Developer"
    - "Software Engineer"
    - "Solutions Architect"
    - "Technical Lead"
    - "Tech Lead"
  negative:
    # [CUSTOMIZE] Exclude non-relevant roles
    - "Junior"
    - "Intern"
    - "Trainee"
    - "Fresher"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Python"
    - "Golang"
    - "Rust"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Architect"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# Focused on India-based .NET/C# roles.

search_queries:
  # -- Naukri (India's largest job board) --
  - name: Naukri — .NET Developer India
    query: 'site:naukri.com ".NET Developer" OR "C# Developer" OR "ASP.NET" India senior'
    enabled: true

  - name: Naukri — .NET Engineer India
    query: 'site:naukri.com ".NET Engineer" OR ".NET Core" OR "Full Stack .NET" Noida OR Gurgaon OR Bangalore OR Hyderabad'
    enabled: true

  - name: Naukri — .NET Tech Lead India
    query: 'site:naukri.com ".NET" "Technical Lead" OR "Tech Lead" OR "Architect" India senior'
    enabled: true

  # -- LinkedIn India --
  - name: LinkedIn — .NET India
    query: 'site:linkedin.com/jobs ".NET Developer" OR "C# Developer" India remote OR Noida OR Gurgaon'
    enabled: true

  - name: LinkedIn — .NET Core India
    query: 'site:linkedin.com/jobs ".NET Core" OR "ASP.NET Core" OR "Azure .NET" India senior'
    enabled: true

  # -- Indeed India --
  - name: Indeed India — .NET Developer
    query: 'site:in.indeed.com ".NET Developer" OR ".NET Engineer" OR "C# Developer" senior India'
    enabled: true

  - name: Indeed India — .NET Architect
    query: 'site:in.indeed.com ".NET Architect" OR "Solutions Architect .NET" OR "Technical Lead .NET" India'
    enabled: true

  # -- Foundit (Monster India) --
  - name: Foundit — .NET India
    query: 'site:foundit.in ".NET Developer" OR "C# Developer" OR ".NET Core" India senior'
    enabled: true

  # -- Instahyre --
  - name: Instahyre — .NET India
    query: 'site:instahyre.com ".NET" OR "C#" OR "ASP.NET" India senior engineer'
    enabled: true

  # -- Greenhouse (global ATS, India roles) --
  - name: Greenhouse — .NET India
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ".NET" OR "C#" OR "ASP.NET" India remote'
    enabled: true

  # -- Lever (global ATS, India roles) --
  - name: Lever — .NET India
    query: 'site:jobs.lever.co ".NET" OR "C#" OR ".NET Core" India remote'
    enabled: true

  # -- Azure / Microsoft stack focus --
  - name: Azure .NET — India (cross-portal)
    query: '"Azure" ".NET" OR "C#" "Senior" OR "Lead" OR "Architect" India Noida OR Gurgaon OR Bangalore OR Hyderabad OR Pune OR Chennai'
    enabled: true

  # -- Remote India .NET --
  - name: Remote .NET — India (cross-portal)
    query: '".NET Developer" OR ".NET Engineer" "remote" India OR "work from home" senior C#'
    enabled: true


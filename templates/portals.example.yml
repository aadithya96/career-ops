# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.mastercard.com   ⚠️ https://mastercard.wd1.myworkdayjobs.com (fallback only)
#   ✅ https://openai.com/careers       ⚠️ https://job-boards.greenhouse.io/openai (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#   Using raw ATS URLs when a branded page exists can cause false 410 errors (job ID mismatch).
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # -- AI/ML roles --
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Voice AI"
    - "Conversational AI"
    - "Speech"
    # -- German AI/ML keywords (DACH market) --
    - "KI"
    - "Künstliche Intelligenz"
    - "KI Engineer"
    - "KI Trainer"
    - "Dozent"
    - "Weiterbildung"
    # -- Engineering roles --
    # -- .NET / C# roles --
    - ".NET"
    - "C#"
    - "dotnet"
    - "dot net"
    # -- Backend roles --
    - "Backend Engineer"
    - "Backend Developer"
    - "Backend Software Engineer"
    - "Software Engineer"
    - "Software Developer"
    # -- Platform / infrastructure --
    - "Platform Engineer"
    - "Infrastructure Engineer"
    - "Site Reliability"
    - "SRE"
    - "DevOps Engineer"
    # -- Architecture / leadership --
    - "Solutions Architect"
    - "Technical Architect"
    - "Staff Engineer"
    - "Principal Engineer"
    - "Tech Lead"
    - "Technical Lead"
    - "Engineering Lead"
    # -- Integration / services --
    - "Integration Engineer"
    - "API Engineer"
    - "Microservices"
    # -- Full stack (backend-heavy) --
    - "Full Stack Engineer"
    - "Full Stack Developer"
  negative:
    - "Junior"
    - "Intern"
    - "Graduate"
    - "Entry Level"
    - "iOS"
    - "Android"
    - "React Native"
    - "Flutter"
    - "PHP"
    - "Ruby"
    - "Golang"
    - "Rust"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Data Scientist"
    - "Data Analyst"
    - "Machine Learning Engineer"
    - "ML Engineer"
    - "Frontend Engineer"
    - "Frontend Developer"
    - "UI Engineer"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Ashby --
  - name: Ashby — Senior .NET Engineer
    query: 'site:jobs.ashbyhq.com "Senior .NET" OR "Senior C#" OR ".NET Engineer" remote'
    enabled: true

  - name: Ashby — Backend Engineer
    query: 'site:jobs.ashbyhq.com "Senior Backend Engineer" OR "Staff Backend Engineer" OR "Principal Engineer" remote'
    enabled: true

  - name: Ashby — Platform & SRE
    query: 'site:jobs.ashbyhq.com "Platform Engineer" OR "Site Reliability" OR "Infrastructure Engineer" remote'
    enabled: true

  - name: Ashby — Solutions Architect
    query: 'site:jobs.ashbyhq.com "Solutions Architect" OR "Technical Architect" OR "Integration Engineer" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Senior .NET Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ".NET Engineer" OR "C# Engineer" OR "Senior Backend" remote'
    enabled: true

  - name: Greenhouse — Platform & Staff Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Staff Engineer" OR "Principal Engineer" OR "Platform Engineer" remote'
    enabled: true

  - name: Greenhouse — Tech Lead
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Tech Lead" OR "Technical Lead" OR "Engineering Lead" backend remote'
    enabled: true

  # -- Lever --
  - name: Lever — Backend & .NET
    query: 'site:jobs.lever.co "Senior Backend Engineer" OR ".NET Engineer" OR "C# Engineer" OR "Platform Engineer" remote'
    enabled: true

  - name: Lever — Staff & Principal
    query: 'site:jobs.lever.co "Staff Engineer" OR "Principal Engineer" OR "Technical Architect" backend remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Senior Backend
    query: 'site:wellfound.com "Senior Backend Engineer" OR ".NET Engineer" OR "C# Engineer" remote'
    enabled: true

  # -- Workable --
  - name: Workable — Backend Engineer
    query: 'site:apply.workable.com "Senior Backend Engineer" OR ".NET" OR "C#" OR "Platform Engineer" remote'
    enabled: true

  # -- LinkedIn (broad) --
  - name: LinkedIn — Senior .NET Remote
    query: 'site:linkedin.com/jobs "Senior .NET Engineer" OR "Senior C# Engineer" remote'
    enabled: true

  - name: Greenhouse — No-Code & Automation
    query: 'site:job-boards.greenhouse.io "no-code" OR "low-code" OR "automation engineer" OR "business systems" senior remote'
    enabled: true

  - name: GTM Engineer — All portals
    query: '"GTM Engineer" OR "RevOps Engineer" OR "Growth Engineer" automation Airtable OR Make OR Clay remote'
    enabled: true

  # -- Voice AI & Conversational AI --
  - name: Voice AI — FDE & SA
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "Voice AI" OR "Conversational AI" OR "Speech" "Solutions" OR "Forward Deployed" OR "Customer Engineer"'
    enabled: true

  - name: Voice AI — AI Engineer
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "Voice" OR "Speech" "AI Engineer" OR "Deployment" OR "Integration"'
    enabled: true

  # -- Contact Center AI --
  - name: Contact Center AI — SA & SE
    query: '"contact center" OR "customer service" "AI" "Solutions Architect" OR "Solutions Engineer" OR "Forward Deployed" remote'
    enabled: true

  # -- FDE specific (cross-portal) --
  - name: FDE & Deployed Engineer — All portals
    query: '"Forward Deployed Engineer" OR "Deployed Engineer" OR "Deployment Engineer" AI site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true


